<!DOCTYPE html>
<html>
<head>
    <title>Roll Reveal Exercise</title>
    <style>
        * { box-sizing: border-box; }
        
        #roll {
            width: 400px;
            height: 400px;
            margin: 50px auto;
            position: relative;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        #roll .image-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        
        #roll img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        #roll div.shutter {
            width: 200px;
            height: 200px;
            position: relative;
            z-index: 2;
            transition: all 0.8s ease-in-out;
        }

        #roll div:nth-of-type(2) { background-color: red; transform-origin: top left; }
        #roll div:nth-of-type(3) { background-color: yellow; transform-origin: top right; }
        #roll div:nth-of-type(4) { background-color: blue; transform-origin: bottom left; }
        #roll div:nth-of-type(5) { background-color: green; transform-origin: bottom right; }
        #roll:hover div:nth-of-type(2) { transform: rotate(-90deg) scale(0); opacity: 0; }
        #roll:hover div:nth-of-type(3) { transform: rotate(90deg) scale(0); opacity: 0; }
        #roll:hover div:nth-of-type(4) { transform: rotate(90deg) scale(0); opacity: 0; }
        #roll:hover div:nth-of-type(5) { transform: rotate(-90deg) scale(0); opacity: 0; }

        p { text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="roll">
        <div class="image-container">
            <a href="../index.html"><img src="../images/funny.jpg" alt="kitten"/></a>
        </div>
        <div class="shutter"></div>
        <div class="shutter"></div>
        <div class="shutter"></div>
        <div class="shutter"></div>
    </div>
    <p>Hover over the squares to see the surprise!<br/>Click on the Image for Home</p>
</body>
</html>
