<!DOCTYPE html>
<html>
<head>
<title>Roll-Skew Reveal Exercise</title>
<meta charset="UTF-8">
<style>
    * { box-sizing: border-box; }
    
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f4f4f4; }

    #roll {
        width: 400px;
        height: 400px;
        position: relative;
        overflow: hidden;
        border: 2px solid #333;
        box-shadow: 0 10px 20px rgba(0,0,0,0.19);
        background-color: white;
    }

    #roll img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        top: 0; left: 0;
        z-index: 1;
    }

    #roll .shutter-container {
        display: flex;
        flex-wrap: wrap;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0; left: 0;
        z-index: 2;
    }

    #roll div.shutter {
        width: 200px;
        height: 200px;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
        opacity: 1;
    }

    #roll div:nth-of-type(2) { background-color: #ff4d4d; transform-origin: top left; }
    #roll div:nth-of-type(3) { background-color: #ffeb3b; transform-origin: top right; }
    #roll div:nth-of-type(4) { background-color: #2196f3; transform-origin: bottom left; }
    #roll div:nth-of-type(5) { background-color: #4caf50; transform-origin: bottom right; }

    #roll:hover div:nth-of-type(2) { 
        transform: skew(60deg, 60deg);
        opacity: 0;
    }
    
    #roll:hover div:nth-of-type(3) { 
        transform: skew(-60deg, -60deg);
        opacity: 0;
    }
    
    #roll:hover div:nth-of-type(4) { 
        transform: skew(-60deg, -60deg);
        opacity: 0;
    }
    
    #roll:hover div:nth-of-type(5) { 
        transform: skew(60deg, 60deg);
        opacity: 0;
    }

    p { text-align: center; margin-top: 20px; font-size: 0.9em; color: #555; max-width: 500px;}
    button { display: block; width: 25vw; padding: 10px; margin: 20px auto; cursor: pointer;}
</style>
</head>
<body>
    <div id="roll">
        <a href="../index.html"><img src="../images/funny.jpg" alt="kitten"/></a>
        
        <div class="shutter-container">
            <div class="shutter"></div>
            <div class="shutter"></div>
            <div class="shutter"></div>
            <div class="shutter"></div>
        </div>
    </div>
    <p>Hover over the squares to see them "skew-roll" and reveal the surprise!</p>
    <button onclick="location.href='../index.html'">Click me for Home</button>
</body>
</html>
