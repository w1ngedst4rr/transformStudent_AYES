<!DOCTYPE html>
<html>
<head>
<title>Roll Reveal Exercise</title>
<style>
    * { box-sizing: border-box; }
    
    #roll {
        width: 400px;
        height: 400px;
        margin: 30px auto;
        position: relative;
        overflow: hidden; 
        border: 1px solid black;
    }

    #roll img {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }
    #roll div {
        width: 200px;
        height: 200px;
        position: absolute;
        z-index: 2;
        transition: all 0.8s ease-in-out;
    }

    #roll div:nth-of-type(1) { background-color: red; top: 0; left: 0; transform-origin: top left; }
    #roll div:nth-of-type(2) { background-color: yellow; top: 0; left: 200px; transform-origin: top right; }
    #roll div:nth-of-type(3) { background-color: blue; top: 200px; left: 0; transform-origin: bottom left; }
    #roll div:nth-of-type(4) { background-color: green; top: 200px; left: 200px; transform-origin: bottom right; }

    #roll:hover div:nth-of-type(1) { transform: skew(45deg, 45deg); }
    #roll:hover div:nth-of-type(2) { transform: skew(-45deg, -45deg); }
    #roll:hover div:nth-of-type(3) { transform: skew(-45deg, -45deg); }
    #roll:hover div:nth-of-type(4) { transform: skew(45deg, 45deg); }

    p { text-align: center; font-family: Arial; }
</style>
</head>
<body>

<div id="roll">
    <img src="../images/funny.jpg"/>
    <div></div> <div></div> <div></div> <div></div> </div>

<p>Click on the Image for Home<br/>
Source: https://www.ba-bamail.com/cute-overload/75-of-the-cutest-kittens-in-the-world/
</p>

</body>
</html>
