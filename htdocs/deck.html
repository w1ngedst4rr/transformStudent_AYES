<!DOCTYPE html>
<html>
<head>
    <title>5 Cards Fan Exercise</title>
    <style>
        * { box-sizing: border-box; }
        
        #deck {
            width: 50vw;
            height: 60vh;
            margin: 50px auto;
            border: 3px solid black;
            padding: 40px;
            position: relative;
            overflow: visible;
        }

        #deck div {
            border: 3px solid black;
            height: 30vh;
            width: 20vw;
            background-color: white;
            color: red;
            font-size: 2em;
            padding: 10px;
            font-weight: bold;
            position: absolute;
            bottom: auto;
            right: auto;
            transform-origin: bottom left; 
            transition: all 0.6s ease-in-out;
            z-index: 1;
        }

        #deck div:nth-child(1) { top: 15vh; left: 15vw; }
        #deck div:nth-child(2) { top: 15vh; left: 15vw; z-index: 2; }
        #deck div:nth-child(3) { top: 15vh; left: 15vw; z-index: 3; }
        #deck div:nth-child(4) { top: 15vh; left: 15vw; z-index: 4; }
        #deck div:nth-child(5) { top: 15vh; left: 15vw; z-index: 5; }

        #deck div:nth-child(1):hover { background-color: white; color: black; }
        #deck div:nth-child(2):hover { background-color: orange; }
        #deck div:nth-child(3):hover { background-color: green; }
        #deck div:nth-child(4):hover { background-color: blue; }
        #deck div:nth-child(5):hover { background-color: violet; }

        #deck:hover div:nth-child(1) { transform: rotate(-60deg); }
        #deck:hover div:nth-child(2) { transform: rotate(-45deg); }
        #deck:hover div:nth-child(3) { transform: rotate(-30deg); }
        #deck:hover div:nth-child(4) { transform: rotate(-15deg); }
        #deck:hover div:nth-child(5) { transform: rotate(0deg); border-color: yellow; }

        button { display: block; width: 25vw; padding: 5px; margin: 10px auto; }
    </style>
</head>
<body>
    <div id="deck">
        <div>&#9824;</div> <div>&#127808;</div> <div>&#9670;</div> <div>&#10084;</div> <div>🃏</div> </div>
    <button onclick="location.href='../index.html'">Click me for Home</button>
</body>
</html>
