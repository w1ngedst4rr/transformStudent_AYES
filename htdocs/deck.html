<!DOCTYPE html>
<html>
<head>
    <title>5 Cards Fan Exercise</title>
    <style>
        * { box-sizing: border-box; }
        
        #deck {
            width: 50vw;
            height: 60vh;
            margin: 50px auto;
            border: 3px solid black;
            padding: 40px;
            position: relative;
            overflow: visible;
        }

        #deck div {
            border: 3px solid black;
            height: 30vh;
            width: 20vw;
            background-color: white;
            color: black;
            font-size: 2em;
            padding: 10px;
            font-weight: bold;
            position: absolute;
            bottom: auto;
            right: auto;
            transform-origin: bottom left; 
            transition: all 0.6s ease-in-out;
            z-index: 1;
        }

        #deck div:nth-child(1) { top: 20vh; left: 17vw; }
        #deck div:nth-child(2) { top: 20vh; left: 17vw; z-index: 2; }
        #deck div:nth-child(3) { top: 20vh; left: 17vw; z-index: 3; }
        #deck div:nth-child(4) { top: 20vh; left: 17vw; z-index: 4; }
        #deck div:nth-child(5) { top: 22vh; left: 19vw; z-index: 5; color: red; }

        #deck div:nth-child(1) { color: white; }
        #deck div:nth-child(2) { color: white; }
        #deck div:nth-child(3) { color: black; }
        #deck div:nth-child(4) { color: blue; }

        #deck div:nth-child(1):hover { background-color: lightpurple; color: white; }
        #deck div:nth-child(2):hover { background-color: green; }
        #deck div:nth-child(3):hover { background-color: pink; }
        #deck div:nth-child(4):hover { background-color: blue; }
        #deck div:nth-child(5):hover { background-color: white; border-color: yellow; }
        #deck div:nth-child(5):hover ~ div:nth-child(1),
        #deck div:nth-child(5):hover + div:nth-child(1) { transform: rotate(-55deg); }
        #deck div:nth-child(5):hover ~ div:nth-child(2),
        #deck div:nth-child(5):hover + div:nth-child(2) { transform: rotate(-40deg); }
        #deck div:nth-child(5):hover ~ div:nth-child(3),
        #deck div:nth-child(5):hover + div:nth-child(3) { transform: rotate(-25deg); }
        #deck div:nth-child(5):hover ~ div:nth-child(4),
        #deck div:nth-child(5):hover + div:nth-child(4) { transform: rotate(-10deg); }
        #deck div:nth-child(5):hover { transform: rotate(0deg); }

        @supports (background-color: lightpurple) {
            #deck div:nth-child(1):hover { background-color: lightpurple; }
        }
        @supports not (background-color: lightpurple) {
            #deck div:nth-child(1):hover { background-color: #D6CADD; }
        }

        button { display: block; width: 25vw; padding: 5px; margin: 10px auto; }
    </style>
</head>
<body>
    <div id="deck">
        <div>🌌</div> <div>🦫</div> <div>💌</div> <div>🐷</div> <div>🃏</div> </div>
    <button onclick="location.href='../index.html'">Click me for Home</button>
</body>
</html>
