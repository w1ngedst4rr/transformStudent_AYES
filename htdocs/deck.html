<!DOCTYPE html>
<html>
<head>
    <title>5 Cards Fan Exercise</title>
    <style>
        * { box-sizing: border-box; }
        #deck {
            width: 50vw;
            height: 60vh;
            margin: 50px auto;
            border: 3px solid black;
            position: relative;
        }
        #deck div {
            border: 3px solid black;
            height: 30vh;
            width: 20vw;
            background-color: white;
            font-size: 2em;
            padding: 10px;
            font-weight: bold;
            position: absolute;
            top: 15vh;
            left: 15vw;
            transform-origin: bottom left; 
            transition: all 0.6s ease-in-out;
        }

        #deck div:nth-child(1) { color: white; }
        #deck div:nth-child(2) { color: white; }
        #deck div:nth-child(3) { color: white; }
        #deck div:nth-child(4) { color: white; }
        #deck div:nth-child(5) { color: red; z-index: 5; }

        #deck div:nth-child(1):hover { background-color: purple; }
        #deck div:nth-child(2):hover { background-color: green; }
        #deck div:nth-child(3):hover { background-color: pink; }
        #deck div:nth-child(4):hover { background-color: blue; }
        #deck div:nth-child(5):hover { background-color: white; border-color: yellow; }

        #deck:hover div:nth-child(1) { transform: rotate(-60deg); }
        #deck:hover div:nth-child(2) { transform: rotate(-45deg); }
        #deck:hover div:nth-child(3) { transform: rotate(-30deg); }
        #deck:hover div:nth-child(4) { transform: rotate(-15deg); }
        #deck:hover div:nth-child(5) { transform: rotate(0deg); }

        button { display: block; width: 25vw; padding: 5px; margin: 10px auto; }
    </style>
</head>
<body>
    <div id="deck">
        <div>&#9824;</div> <div>&#127808;</div> <div>&#9670;</div> <div>&#10084;</div> <div>🃏</div>
    </div>
    <button onclick="location.href='../index.html'">Click me for Home</button>
</body>
</html>
